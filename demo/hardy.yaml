node-ids: ["dtn://hardy.dtn/", "ipn:2.0"]
log-level: info

grpc:
  address: "[::1]:50051"
  services:
    - application
    - cla
    - service

storage:
  metadata:
    type: memory
  bundle:
    type: memory

asabr:
  protocol-id: "asabr"
  router: "SpsnHybridParenting"
  contact-plan-path: "demo/alice.cp"
  local-node-id: "ipn:2.0"
  eid-map:
    "dtn://alice.dtn/": 0
    "dtn://unibo.dtn/": 1
    "dtn://hardy.dtn/": 2
    "dtn://bob.dtn/": 3

clas:
  - name: cspcl-can
    type: cspcl
    local-addr: 2
    port: 10
    interface: can
    interface-name: vcan0
    peers:
      - node-id: "dtn://unibo.dtn/"
        addr: 1
        port: 10
      - node-id: "dtn://bob.dtn/"
        addr: 3
        port: 10
