node-ids: "dtn://hardy.dtn/"
log-level: info

grpc:
  address: "[::1]:50051"
  services:
    - application
    - cla
    - service

storage:
  metadata:
    type: memory
  bundle:
    type: memory

clas:
  - name: cspcl-can
    type: cspcl
    local-addr: 2
    port: 10
    interface: can
    interface-name: vcan0
    peers:
      - node-id: "dtn://unibo.dtn/"
        addr: 1
        port: 10
      - node-id: "dtn://bob.dtn/"
        addr: 3
        port: 10
